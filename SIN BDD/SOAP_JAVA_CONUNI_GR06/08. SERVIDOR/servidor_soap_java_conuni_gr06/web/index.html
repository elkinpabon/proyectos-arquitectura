<!DOCTYPE html>
<html>
<head>
    <title>Probador del Servicio Web CONUNI</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        .operacion {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        label {
            display: inline-block;
            width: 150px;
            margin-right: 10px;
        }
        input[type="number"] {
            padding: 5px;
            margin-right: 10px;
        }
        button {
            padding: 5px 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .respuesta {
            margin-top: 10px;
            padding: 10px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>Servicio Web CONUNI - Probador</h1>

    <!-- Operacion Suma -->
    <div class="operacion">
        <h2>Suma</h2>
        <label for="suma_a">Numero 1 (a):</label>
        <input type="number" id="suma_a" value="0">
        <label for="suma_b">Numero 2 (b):</label>
        <input type="number" id="suma_b" value="0">
        <button onclick="probarSuma()">Probar</button>
        <div id="suma_respuesta" class="respuesta"></div>
    </div>

    <!-- Operacion Pulgadas a Centimetros -->
    <div class="operacion">
        <h2>Pulgadas a Centimetros</h2>
        <label for="pulgadas">Pulgadas:</label>
        <input type="number" id="pulgadas" value="0" step="0.01">
        <button onclick="probarPulgadasACentimetros()">Probar</button>
        <div id="pulgadas_respuesta" class="respuesta"></div>
    </div>

    <!-- Operacion Centimetros a Pulgadas -->
    <div class="operacion">
        <h2>Centimetros a Pulgadas</h2>
        <label for="centimetros">Centimetros:</label>
        <input type="number" id="centimetros" value="0" step="0.01">
        <button onclick="probarCentimetrosAPulgadas()">Probar</button>
        <div id="centimetros_respuesta" class="respuesta"></div>
    </div>

    <script>
        const urlServicio = "http://localhost:8080/servidor_soap_java_conuni_gr06/CONUNI";

        async function enviarSolicitudSoap(nombreOperacion, contenidoCuerpo) {
            const solicitudSoap = `
                <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:con="http://controlador.monster.edu.ec/">
                    <soapenv:Header/>
                    <soapenv:Body>
                        <con:${nombreOperacion}>
                            ${contenidoCuerpo}
                        </con:${nombreOperacion}>
                    </soapenv:Body>
                </soapenv:Envelope>
            `;

            try {
                const respuesta = await fetch(urlServicio, {
                    method: "POST",
                    headers: {
                        "Content-Type": "text/xml; charset=utf-8",
                        "SOAPAction": ""
                    },
                    body: solicitudSoap
                });

                const texto = await respuesta.text();
                const analizador = new DOMParser();
                const documentoXml = analizador.parseFromString(texto, "text/xml");
                const valorRetorno = documentoXml.getElementsByTagNameNS("http://controlador.monster.edu.ec/", nombreOperacion + "Response")[0]
                    .getElementsByTagName("return")[0].textContent;
                return valorRetorno;
            } catch (excepcion) {
                return "Error: " + excepcion.message;
            }
        }

        async function probarSuma() {
            const a = document.getElementById("suma_a").value;
            const b = document.getElementById("suma_b").value;
            const contenidoCuerpo = `<a>${a}</a><b>${b}</b>`;
            const resultado = await enviarSolicitudSoap("suma", contenidoCuerpo);
            document.getElementById("suma_respuesta").innerText = "Resultado: " + resultado;
        }

        async function probarPulgadasACentimetros() {
            const pulgadas = document.getElementById("pulgadas").value;
            const contenidoCuerpo = `<pulgadas>${pulgadas}</pulgadas>`;
            const resultado = await enviarSolicitudSoap("pulgadasACentimetros", contenidoCuerpo);
            document.getElementById("pulgadas_respuesta").innerText = "Resultado: " + resultado + " cm";
        }

        async function probarCentimetrosAPulgadas() {
            const centimetros = document.getElementById("centimetros").value;
            const contenidoCuerpo = `<centimetros>${centimetros}</centimetros>`;
            const resultado = await enviarSolicitudSoap("centimetrosAPulgadas", contenidoCuerpo);
            document.getElementById("centimetros_respuesta").innerText = "Resultado: " + resultado + " pulgadas";
        }
    </script>
</body>
</html>
